name: loopie-integration

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: intelligence
      POSTGRES_PASSWORD: intelligence
      POSTGRES_DB: intelligence_app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intelligence -d intelligence_app"]
      interval: 3s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 15

  tests:
    build:
      context: ./agent
      dockerfile: Dockerfile
      target: test
    environment:
      POSTGRES_URL: postgresql://intelligence:intelligence@postgres:5432/intelligence_app
      REDIS_URL: redis://redis:6379/1
      LOOPIE_HOSTED: "0"
      LOOPIE_PERSISTENCE_MODE: hosted
      LOOPIE_LLM_MODE: test
      LOOPIE_WEAVE_ENABLED: "false"
    command:
      - sh
      - -c
      - uv run alembic upgrade head && uv run pytest -m "integration and not live" -q -rs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
