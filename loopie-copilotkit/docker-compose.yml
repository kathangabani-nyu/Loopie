name: loopie

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: intelligence
      POSTGRES_PASSWORD: intelligence
      POSTGRES_DB: intelligence_app
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - loopie-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intelligence -d intelligence_app"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - loopie-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./agent
      dockerfile: Dockerfile
    environment:
      POSTGRES_URL: postgresql://intelligence:intelligence@postgres:5432/intelligence_app
      REDIS_URL: redis://redis:6379/1
      LOOPIE_HOSTED: "0"
      LOOPIE_PERSISTENCE_MODE: hosted
      # The default Compose stack is a deterministic local smoke environment.
      # Run the API outside Compose for explicitly confirmed live-provider work.
      LOOPIE_LLM_MODE: test
      LOOPIE_LIVE_CONFIRMED: "0"
      LOOPIE_WEAVE_ENABLED: "false"
      LOOPIE_API_TOKEN: local-loopie-service-token
      LOOPIE_UI_ORIGIN: http://localhost:3000
    command:
      - sh
      - -c
      - alembic upgrade head && uvicorn loopie_server:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=2)"
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  loopie-postgres:
  loopie-redis:
