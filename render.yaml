services:
  - type: web
    name: loopie-api
    runtime: docker
    plan: free
    dockerfilePath: ./loopie-copilotkit/agent/Dockerfile
    dockerContext: ./loopie-copilotkit/agent
    healthCheckPath: /health
    envVars:
      - key: LOOPIE_HOSTED
        value: "1"
      - key: LOOPIE_LLM_MODE
        value: live
      - key: LOOPIE_LIVE_CONFIRMED
        value: "1"
      - key: LOOPIE_WEAVE_ENABLED
        value: "true"
      - key: LOOPIE_FULL_AGENTIC
        value: "true"
      - key: LOOPIE_PERSISTENCE_MODE
        value: hosted
      - key: LOOPIE_ALLOW_INSECURE_REDIS
        value: "1"
      - key: LOOPIE_JUDGE_ENABLED
        value: "false"
      - key: WEAVE_PROJECT
        value: loopie
      - key: REDIS_URL
        sync: false
      - key: POSTGRES_URL
        fromDatabase:
          name: loopie-postgres
          property: connectionString
      - key: WANDB_API_KEY
        sync: false
      - key: WANDB_ENTITY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: LOOPIE_API_TOKEN
        sync: false
      - key: LOOPIE_UI_ORIGIN
        sync: false
      - key: LOOPIE_ENABLE_ADMIN_RESET
        value: "false"

databases:
  - name: loopie-postgres
    plan: free
    postgresMajorVersion: "16"
    databaseName: loopie
    user: loopie
    ipAllowList: []
