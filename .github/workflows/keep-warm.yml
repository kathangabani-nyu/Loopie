name: keep-warm

# Manual-only warmup for a demo/judging window.
# Do not re-enable a schedule unless hosted services are intentionally in use.

on:
  workflow_dispatch: {} # allow manual "warm now" before recording

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping loopie-api /health
        env:
          RENDER_URL: ${{ vars.RENDER_URL }}
        run: |
          if [ -z "$RENDER_URL" ]; then
            echo "Set repo variable RENDER_URL (Settings -> Secrets and variables -> Actions -> Variables) to your Render URL, e.g. https://loopie-api.onrender.com"
            exit 1
          fi
          echo "Pinging $RENDER_URL/health"
          curl -fsS --max-time 90 "$RENDER_URL/health" && echo "" && echo "api warm OK"
      - name: Ping loopie-agent /ok
        env:
          AGENT_URL: ${{ vars.AGENT_URL }}
        run: |
          if [ -z "$AGENT_URL" ]; then
            echo "Set repo variable AGENT_URL to your LangGraph agent URL, e.g. https://loopie-agent.onrender.com"
            exit 1
          fi
          echo "Pinging $AGENT_URL/ok"
          curl -fsS --max-time 90 "$AGENT_URL/ok" && echo "" && echo "agent warm OK"
