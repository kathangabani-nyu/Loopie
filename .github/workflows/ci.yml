name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: loopie-copilotkit/agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        run: python -m pip install uv
      - name: Sync locked dependencies
        run: uv sync --frozen --dev
      - name: Lint
        run: uv run ruff check src tests migrations loopie_server.py loopie_dev.py loopie_graph.py loopie_control.py
      - name: Compile migrations
        run: uv run alembic upgrade head --sql > /tmp/loopie-migration.sql
      - name: Fast deterministic tests
        env:
          LOOPIE_HOSTED: "0"
          LOOPIE_PERSISTENCE_MODE: memory
          LOOPIE_WEAVE_ENABLED: "false"
        run: uv run pytest -m "not integration and not live" -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: loopie-copilotkit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: loopie-copilotkit/package-lock.json
      - name: Install locked dependencies
        run: npm ci --ignore-scripts
      - name: Type-check
        run: npx tsc --noEmit
      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high
      - name: Build
        env:
          AUTH_SECRET: ci-only-auth-secret-at-least-32-characters
          LOOPIE_ADMIN_PASSWORD: ci-only-password
          LOOPIE_API_TOKEN: ci-only-service-token
        run: npm run build

  durable-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: intelligence
          POSTGRES_PASSWORD: intelligence
          POSTGRES_DB: intelligence_app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U intelligence -d intelligence_app"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: loopie-copilotkit/agent
    env:
      POSTGRES_URL: postgresql://intelligence:intelligence@localhost:5432/intelligence_app
      REDIS_URL: redis://localhost:6379/1
      LOOPIE_HOSTED: "0"
      LOOPIE_PERSISTENCE_MODE: hosted
      LOOPIE_LLM_MODE: test
      LOOPIE_WEAVE_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        run: python -m pip install uv
      - name: Sync locked dependencies
        run: uv sync --frozen --dev
      - name: Apply migrations online
        run: uv run alembic upgrade head
      - name: Real Postgres and Redis recovery contract
        run: uv run pytest -m "integration and not live" -q -rs

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
