name: Nightly reliability

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  golden-and-live-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: loopie-copilotkit/agent
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
      WANDB_ENTITY: ${{ secrets.WANDB_ENTITY }}
      LOOPIE_WEAVE_ENABLED: "true"
      LOOPIE_PERSISTENCE_MODE: memory
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        run: python -m pip install uv
      - name: Sync locked dependencies
        run: uv sync --frozen --dev
      - name: Golden regression contract
        env:
          LOOPIE_LLM_MODE: test
          LOOPIE_WEAVE_ENABLED: "false"
        run: uv run pytest tests/test_pipeline.py -m integration -q
      - name: Require live-smoke credentials
        run: |
          test -n "$OPENAI_API_KEY" || { echo "OPENAI_API_KEY secret is required"; exit 1; }
          test -n "$WANDB_API_KEY" || { echo "WANDB_API_KEY secret is required"; exit 1; }
          test -n "$WANDB_ENTITY" || { echo "WANDB_ENTITY secret is required"; exit 1; }
      - name: Budget-capped live honesty smoke
        env:
          LOOPIE_LLM_MODE: live
          LOOPIE_LIVE_CONFIRMED: "1"
          LOOPIE_RUN_LIVE_TESTS: "1"
          LOOPIE_MAX_ESTIMATED_COST_USD: "0.25"
        run: uv run pytest tests/test_live.py -m "integration and live" -q
